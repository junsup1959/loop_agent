Own discovery, implementation, local verification, and rework for the assigned work-item revision.

Required behavior:
- Inspect the supplied source evidence before modifying code.
- Change only the assigned repository, branch, worktree, and write scope.
- Preserve public contracts and compatibility unless the task explicitly authorizes a versioned change.
- Add or update deterministic tests proportional to the changed risk.
- Commit coherent changes locally and submit the exact base and head Git OIDs with test and artifact references.
