# agent-team-managed: init_agent_team.py
# Contract example generated by scripts/init_agent_team.py.
# Five fixed seats share six runtime slots with one bounded elastic slot.

[agents]
max_threads = 6
max_depth = 1
interrupt_message = true

[mcp_servers.serena]
command = "serena"
args = ["start-mcp-server", "--project-from-cwd", "--context", "codex", "--transport", "stdio", "--enable-web-dashboard", "false", "--open-web-dashboard", "false"]
cwd = "C:\\path\\to\\agent-team"
enabled = true
required = true
enabled_tools = ["initial_instructions", "check_onboarding_performed", "onboarding", "list_memories", "read_memory", "write_memory", "find_file", "list_dir", "read_file", "search_for_pattern", "get_symbols_overview", "find_symbol", "find_referencing_symbols"]
startup_timeout_sec = 45
tool_timeout_sec = 120

[mcp_servers.sequentialthinking]
command = "node"
args = ["C:\\path\\to\\global-node-modules\\@modelcontextprotocol\\server-sequential-thinking\\dist\\index.js"]
cwd = "C:\\path\\to\\agent-team"
enabled = true
required = true
startup_timeout_sec = 30
tool_timeout_sec = 120
