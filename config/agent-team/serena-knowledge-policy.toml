[knowledge]
version = 2
policy_id = "pl-serena-onboarding-v2"
owner_role = "pl"
owner_capability = "pl"
architecture_evidence_role = "ta"
state_store = "sqlite"
allow_all_roles_read = true
allow_all_roles_semantic_exploration = true
shared_memory_publish_mode = "pl_acknowledged"

[bootstrap]
required_memory_names = [
  "core",
  "tech_stack",
  "suggested_commands",
  "conventions",
  "task_completion",
]
initialize_memory_layout = true
require_language_configuration = true

[onboarding]
initial_instructions_required = true
source_oid_match_required = true
developer_consumption_before_mutation = true
snapshot_binding_mode = "name-ref-sha256-only"

[refresh]
apply_on = "approved_integration_oid"
auto_write = false
require_memory_check = true
accepted_decisions = ["refreshed", "no_change", "deferred"]

[freshness]
maximum_age_hours = 168
trigger_ids = [
  "new-repository",
  "missing-required-memory",
  "material-project-change",
  "stale-project-knowledge",
]

[detection]
trigger_paths = [
  "*.sln",
  "*.slnx",
  "*.csproj",
  "*.fsproj",
  "*.vbproj",
  "*.vcxproj",
  "**/CMakeLists.txt",
  "CMakePresets.json",
  "**/CMakePresets.json",
  "Cargo.toml",
  "**/Cargo.toml",
  "pyproject.toml",
  "**/pyproject.toml",
  "package.json",
  "**/package.json",
  "go.mod",
  "**/go.mod",
  "pom.xml",
  "**/pom.xml",
  "build.gradle",
  "build.gradle.kts",
  "settings.gradle",
  "settings.gradle.kts",
  "requirements*.txt",
  "**/requirements*.txt",
  "Dockerfile",
  "**/Dockerfile",
  "AGENTS.md",
  ".serena/project.yml",
  "**/.github/workflows/**",
  "scripts/**",
]

[content_boundary]
allowed_content_classes = [
  "project_core",
  "tech_stack",
  "project_conventions",
  "coding_guidance",
  "stable_structure",
  "stable_ownership",
  "build_test_commands",
]
prohibited_terms = [
  "active task",
  "active work item",
  "work item",
  "current diff",
  "oid approval",
  "approval decision",
  "workspace lease",
  "lease id",
  "agent-team",
  "team role",
  "workflow state",
  "activation contract",
  "contract id",
  "system prompt",
  "prompt text",
  "per-run result",
  "goal-loop",
  "module-loop",
  "taskflow",
  "sqlite message",
]

[context]
max_memory_refs = 3
max_semantic_items = 8
max_semantic_chars = 16000
require_target_oid = true

[role_memory_refs]
pm = ["core"]
ta = ["core", "tech_stack", "conventions"]
pl = ["core", "tech_stack", "suggested_commands"]
developer = ["core", "conventions", "suggested_commands"]
qa_sdet = ["core", "suggested_commands", "task_completion"]
build_release = ["core", "tech_stack", "suggested_commands"]
worker = ["core", "conventions"]
advisory = ["core", "tech_stack", "conventions"]

[transition_memory_refs]
pl_assign_implementation = ["core", "conventions", "suggested_commands"]
pl_issue_rework = ["core", "conventions", "suggested_commands"]
dev_submit_revision = ["core", "conventions", "suggested_commands"]
dev_submit_rework = ["core", "conventions", "suggested_commands"]
