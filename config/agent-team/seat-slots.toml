[topology]
version = 1
topology_id = "six-slot-v1"
fixed_slot_count = 5
elastic_slot_count = 1
max_runtime_slots = 6
single_active_capability_per_slot = true
max_elastic_workers_per_goal_run = 1

[[slots]]
slot_key = "pm_ta"
slot_type = "fixed"
id_prefix = "PM"
capabilities = ["pm", "ta"]
default_capability = "pm"
capability_runtime_profiles = { pm = "pm", ta = "ta" }
mutually_exclusive_capabilities = ["pm", "ta"]
persistent_identity = true

[[slots]]
slot_key = "pl"
slot_type = "fixed"
id_prefix = "PL"
capabilities = ["pl"]
default_capability = "pl"
capability_runtime_profiles = { pl = "pl" }
mutually_exclusive_capabilities = []
persistent_identity = true

[[slots]]
slot_key = "dev_1"
slot_type = "fixed"
id_prefix = "DEV"
capabilities = ["developer"]
default_capability = "developer"
capability_runtime_profiles = { developer = "developer" }
mutually_exclusive_capabilities = []
persistent_identity = true

[[slots]]
slot_key = "dev_2"
slot_type = "fixed"
id_prefix = "DEV"
capabilities = ["developer"]
default_capability = "developer"
capability_runtime_profiles = { developer = "developer" }
mutually_exclusive_capabilities = []
persistent_identity = true

[[slots]]
slot_key = "qa_build"
slot_type = "fixed"
id_prefix = "QA_SDET"
capabilities = ["qa_sdet", "build_release"]
default_capability = "qa_sdet"
capability_runtime_profiles = { qa_sdet = "quality", build_release = "build_release" }
mutually_exclusive_capabilities = ["qa_sdet", "build_release"]
persistent_identity = true

[[slots]]
slot_key = "elastic"
slot_type = "elastic"
capabilities = ["worker", "advisory"]
default_capability = "worker"
capability_runtime_profiles = { worker = "elastic_worker", advisory = "elastic_advisory" }
mutually_exclusive_capabilities = ["worker", "advisory"]
persistent_identity = false
worker_definition_sources = ["agents/custom-agents", "ordinary-subagent"]
max_active_workers_per_goal_run = 1
nested_spawn_allowed = false
standing_approval_authority = false
