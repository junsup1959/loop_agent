[service]
version = 1
transport = "streamable-http"
host = "127.0.0.1"
port_strategy = "random_persisted"
endpoint_path = "/mcp"
context = "codex"
enable_web_dashboard = false
open_web_dashboard = false
startup_timeout_seconds = 30
state_file = ".agent-team/state/serena-service.json"
log_file = ".agent-team/logs/serena-http.log"
