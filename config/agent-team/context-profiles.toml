[context]
version = 2
default_profile = "auto"

[professional_profile]
runtime_skill_id = "professional-profile-runtime"
compiled_binding_required = true
minimum_reference_count = 4
maximum_reference_count = 5
model_selection_allowed = false
authority_expansion_allowed = false

[contract_budget]
formula = "min(role_packet_limit * 0.25, 12000)"
role_packet_ratio = 0.25
ceiling_chars = 12000
includes_rendered_contract = true
includes_selected_clauses = true

[capability_defaults]
pm = "requirements"
ta = "architecture-review"
pl = "planning"
developer = "implementation"
qa_sdet = "quality-review"
build_release = "build-release"
worker = "elastic-worker"
advisory = "elastic-advisory"

[profiles.requirements]
capabilities = ["pm"]
expansion_level = 1
max_messages = 6
max_message_chars = 8000
max_snapshot_chars = 6000
max_paths = 0
max_diff_chars = 0
max_commits = 2
max_skills = 2
max_skill_chars = 8000
max_packet_chars = 24000

