[knowledge]
version = 1
owner_role = "pl"
architecture_evidence_role = "ta"
state_store = "sqlite"
allow_all_roles_read = true
allow_all_roles_semantic_exploration = true
shared_memory_publish_mode = "pl_acknowledged"

[bootstrap]
required_memory_names = [
  "core",
  "tech_stack",
  "suggested_commands",
  "conventions",
  "task_completion",
]
initialize_memory_layout = true
require_language_configuration = true

[refresh]
apply_on = "approved_integration_oid"
auto_write = false
require_memory_check = true
accepted_decisions = ["refreshed", "no_change", "deferred"]

[detection]
trigger_paths = [
  "*.sln",
  "*.slnx",
  "*.csproj",
  "*.fsproj",
  "*.vbproj",
  "*.vcxproj",
  "**/CMakeLists.txt",
  "CMakePresets.json",
  "**/CMakePresets.json",
  "Cargo.toml",
  "**/Cargo.toml",
  "pyproject.toml",
  "**/pyproject.toml",
  "package.json",
  "**/package.json",
  "go.mod",
  "**/go.mod",
  "pom.xml",
  "**/pom.xml",
  "build.gradle",
  "build.gradle.kts",
  "settings.gradle",
  "settings.gradle.kts",
  "requirements*.txt",
  "**/requirements*.txt",
  "Dockerfile",
  "**/Dockerfile",
  "config/agent-team/activation-instructions.md",
  ".serena/project.yml",
  "**/.github/workflows/**",
  "scripts/**",
]

[context]
max_memory_refs = 3
max_semantic_items = 8
max_semantic_chars = 16000
require_target_oid = true

[role_memory_refs]
pm = ["core"]
pl = ["core", "tech_stack", "suggested_commands"]
ta = ["core", "tech_stack", "conventions"]
dev_1 = ["core", "conventions"]
dev_2 = ["core", "conventions"]
dev_3 = ["core", "conventions"]
qa_sdet = ["core", "suggested_commands", "task_completion"]
build_release = ["core", "tech_stack", "suggested_commands"]
