[bundle]
id = "agent-team-codex-native"
format_version = 2
scope = "project"
delivery = "overlay"
description = "Validated project-local Codex agent-team configuration with bounded large-source research evidence."

[paths]
skill_root = ".agents/skills"
custom_agent_root = ".codex/agents"
team_configuration_root = "config/agent-team"
bootstrap_skill = ".agents/skills/agent-team-bootstrap/SKILL.md"
activation_instructions = "config/agent-team/activation-instructions.md"
recommended_tools = "config/agent-team/recommended-tools.md"
rtk_policy = "config/agent-team/RTK.md"
rtk_hook = "scripts/rtk_pre_tool_use.py"
message_echo_hook = "scripts/message_echo_hook.sh"
research_ledger = "scripts/agent_team_research.py"
research_taskflow = "scripts/agent_team_taskflow.py"

[contents]
skill_count = 24
custom_agent_count = 8
legacy_skill_root_absent = true
legacy_agent_root_absent = true
codex_skill_mirror_absent = true
agents_md_absent = true

[logical_skill_aliases]
goal_loop = "goal-loop"
moudle_loop = "module-loop"
research_loop = "research-loop"

[verification]
skill_catalog_validated = true
agent_configuration_validated = true
goal_loop_skill_validated = true
module_loop_skill_validated = true
research_loop_skill_validated = true
positive_skill_injection_validated = true
minimum_context_isolation_validated = true
research_ledger_flow_validated = true
research_context_reference_selection_validated = true
research_artifact_authorization_validated = true
research_taskflow_configuration_validated = true
queue_outbox_viewer_integration_validated = true
activation_instruction_injection_validated = true
recommended_tool_injection_validated = true
rtk_pre_tool_use_hook_validated = true
temporary_test_sources_retained = false

[activation]
mcp_capabilities_optional_by_default = true
serena_setup_required_before_serena_enablement = true
codex_config_generated_without_mcp_prerequisite = true
airflow_dag_execution_requires_linux_or_wsl = true
